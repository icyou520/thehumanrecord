<!DOCTYPE html>
<html lang="{{ .Lang | default "en" }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if not .IsHome }}{{ .Title }} — {{ end }}{{ .Site.Title }}</title>
  <meta name="description" content="{{ with .Params.summary }}{{ . }}{{ else }}{{ with .Params.description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}{{ end }}">
  <link rel="canonical" href="{{ .Permalink }}">
  <link rel="alternate" type="application/rss+xml" title="{{ .Site.Title }}" href="{{ "index.xml" | absURL }}">

  {{/* Schema.org structured data */}}
  {{ partial "schema.html" . }}

  {{/* Open Graph */}}
  <meta property="og:title" content="{{ .Title }}">
  <meta property="og:description" content="{{ with .Params.summary }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:site_name" content="{{ .Site.Title }}">

  <link rel="stylesheet" href="{{ "css/style.css" | absURL }}">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <nav aria-label="Main navigation">
      <a href="{{ "/" | absURL }}" class="site-title">{{ .Site.Title }}</a>
      <ul class="nav-links">
        {{ range .Site.Menus.main }}
        <li><a href="{{ .URL }}"{{ if $.IsMenuCurrent "main" . }} aria-current="page"{{ end }}>{{ .Name }}</a></li>
        {{ end }}
      </ul>
    </nav>
  </header>

  <main id="main">
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="site-footer">
    <p>
      <a href="{{ .Site.Params.licenseURL }}" rel="license">CC BY-SA 4.0</a> ·
      <a href="{{ .Site.Params.repository }}">Source</a> ·
      <a href="{{ "index.xml" | absURL }}">RSS</a>
    </p>
    <p class="tagline">{{ .Site.Params.tagline }}</p>
  </footer>
</body>
</html>
